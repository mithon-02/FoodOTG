{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOTG | Login</title>
    <link rel="stylesheet" href="{% static 'css/login_styles.css' %}">
</head>
<body>

<div class="container">
    <h2>Welcome to FoodOTG</h2>
    <p class="subtext">Choose how you want to sign in</p>

    <div class="input-group">
        <button type="button" onclick="window.location.href='/customer-login/'">
            Login as Customer
        </button>
    </div>

    <div class="input-group">
        <button type="button" class="secondary-btn" onclick="window.location.href='/business-login/'">
            Login as Business Owner
        </button>
    </div>

    <p class="footer-text">
        Don’t have an account? <a href="/register/">Register</a>
    </p>
</div>

</body>
</html>
