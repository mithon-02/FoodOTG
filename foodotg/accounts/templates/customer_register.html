{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOTG | Customer Register</title>
    <link rel="stylesheet" href="{% static 'css/register_styles.css' %}">
</head>
<body>

<div class="container">

    <!-- SUCCESS OVERLAY -->
    <div id="success-layer">
        <div class="check-circle">✓</div>
        <h2>Success</h2>
        <p>Registration is Complete</p>
    </div>

    <h2>Create Customer Account</h2>

    <div id="msg" class="error"></div>

    <div class="input-group">
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email Address">
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="Password">
    </div>

    <div class="input-group">
        <input type="password" id="confirm_pass" placeholder="Confirm Password">
    </div>

    <button onclick="executeRegistration()">Create Account</button>

    <div class="footer-text">
        Already registered? <a href="/login/">Sign In</a>
    </div>
</div>

<script>
async function executeRegistration() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const confirmPass = document.getElementById("confirm_pass").value;
    const msg = document.getElementById("msg");

    msg.innerText = "";

    if (!name || !email || !pass || !confirmPass) {
        msg.innerText = "All fields must be filled.";
        return;
    }

    if (pass !== confirmPass) {
        msg.innerText = "Passwords do not match.";
        return;
    }

    if (pass.length < 6) {
        msg.innerText = "Security requires 6+ characters.";
        return;
    }

    const btn = document.querySelector("button");
    btn.innerText = "REGISTERING...";
    btn.disabled = true;

    try {
        const response = await fetch("/api/register/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name,
                email,
                password: pass,
                role: "customer"
            })
        });

        const data = await response.json();

        if (response.status === 201) {
            document.getElementById("success-layer").style.display = "flex";
            setTimeout(() => { 
                window.location.href = "/customer-login/"; 
            }, 2000);
        } else {
            const firstError = Object.values(data)[0];
            msg.innerText = Array.isArray(firstError) ? firstError[0] : "Registration failed.";
            btn.innerText = "Create Account";
            btn.disabled = false;
        }
    } catch (e) {
        msg.innerText = "Server communication error.";
        btn.innerText = "Create Account";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
