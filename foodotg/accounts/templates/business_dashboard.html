{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOTG | Business Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/business_dashboard_styles.css' %}">
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2>Business Dashboard</h2>
            <p class="subtitle">Manage your restaurants, menu items, and customer reviews</p>
        </div>

        <div class="header-actions">
            <button type="button" onclick="openRestaurantModal()">Add Restaurant</button>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3 id="totalRestaurants">0</h3>
            <p>Total Restaurants</p>
        </div>

        <div class="stat-card">
            <h3 id="averageRating">0.0</h3>
            <p>Average Rating</p>
        </div>

        <div class="stat-card">
            <h3 id="deliveryEnabled">0</h3>
            <p>Delivery Enabled</p>
        </div>
    </div>

    <div class="section">
        <h3>Your Restaurants</h3>
        <div id="restaurantList" class="grid"></div>
    </div>

    <div class="section reviews-section">
        <h3>Customer Reviews</h3>
        <div id="reviewList" class="reviews-grid"></div>
    </div>
</div>

<!-- =========================
     ADD RESTAURANT MODAL
========================= -->
<div id="restaurantModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add New Restaurant</h3>
            <span class="close" onclick="closeRestaurantModal()">&times;</span>
        </div>

        <div id="restaurantMsg" class="error"></div>

        <form id="restaurantForm">
            <div class="input-group">
                <input type="text" name="name" placeholder="Restaurant Name" required>
            </div>

            <div class="input-group">
                <textarea name="description" placeholder="Description" required></textarea>
            </div>

            <div class="input-group">
                <input type="text" name="address" placeholder="Address" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <input type="number" step="0.0001" name="latitude" value="23.8103" placeholder="Latitude">
                </div>

                <div class="input-group">
                    <input type="number" step="0.0001" name="longitude" value="90.4125" placeholder="Longitude">
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <select name="category" required>
                        <option value="Bangladeshi">Bangladeshi</option>
                        <option value="Mughlai">Mughlai</option>
                        <option value="BBQ">BBQ</option>
                        <option value="Fusion">Fusion</option>
                        <option value="Bengali">Bengali</option>
                        <option value="Fast Food">Fast Food</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Thai">Thai</option>
                    </select>
                </div>

                <div class="input-group">
                    <select name="price_range" required>
                        <option value="৳">৳</option>
                        <option value="৳৳">৳৳</option>
                        <option value="৳৳৳">৳৳৳</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <input type="url" name="image" placeholder="Image URL (optional)">
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="delivery_available" checked>
                    Delivery Available
                </label>
            </div>

            <div class="button-row">
                <button type="submit">Add Restaurant</button>
                <button type="button" class="secondary-btn" onclick="closeRestaurantModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- =========================
     MENU MODAL
========================= -->
<div id="menuModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="menuModalTitle">Manage Menu</h3>
            <span class="close" onclick="closeMenuModal()">&times;</span>
        </div>

        <div id="menuMsg" class="error"></div>

        <form id="menuForm">
            <div class="input-group">
                <input type="text" id="menu_name" placeholder="Item Name" required>
            </div>

            <div class="input-group">
                <textarea id="menu_description" placeholder="Item Description"></textarea>
            </div>

            <div class="input-group">
                <input type="number" id="menu_price" step="0.01" placeholder="Price" required>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="menu_available" checked>
                    Available
                </label>
            </div>

            <div class="button-row">
                <button type="submit">Save Menu Item</button>
                <button type="button" class="secondary-btn" onclick="closeMenuModal()">Cancel</button>
            </div>
        </form>

        <div class="section">
            <h3>Menu Items</h3>
            <div id="menuItemsList" class="grid"></div>
        </div>
    </div>
</div>

<script>
/* =========================
   AUTH HELPERS
========================= */
function getAccessToken() {
    return localStorage.getItem("token") || localStorage.getItem("access");
}

function authHeaders(extra = {}) {
    return {
        ...extra,
        "Authorization": "Bearer " + getAccessToken()
    };
}

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function formatDateTime(value) {
    try {
        return new Date(value).toLocaleString();
    } catch (error) {
        return value || "";
    }
}

function renderStars(rating) {
    const safeRating = Math.max(0, Math.min(5, Number(rating) || 0));
    let html = "";
    for (let i = 1; i <= 5; i++) {
        html += `<span class="review-star ${i <= safeRating ? "filled" : ""}">★</span>`;
    }
    return html;
}

/* =========================
   AUTH CHECK
========================= */
if (!getAccessToken()) {
    window.location.href = "/business-login/";
}

if (localStorage.getItem("role") !== "business_owner") {
    alert("Access denied. This page is for business owners only.");
    window.location.href = "/customer-dashboard/";
}

/* =========================
   GLOBAL STATE
========================= */
const restaurantModal = document.getElementById("restaurantModal");
const restaurantList = document.getElementById("restaurantList");
const restaurantForm = document.getElementById("restaurantForm");
const restaurantMsg = document.getElementById("restaurantMsg");

const menuModal = document.getElementById("menuModal");
const menuForm = document.getElementById("menuForm");
const menuMsg = document.getElementById("menuMsg");
const menuItemsList = document.getElementById("menuItemsList");

const reviewList = document.getElementById("reviewList");

let currentRestaurantId = null;
let editingMenuItemId = null;

/* =========================
   RESTAURANT MODAL
========================= */
function openRestaurantModal() {
    restaurantModal.style.display = "flex";
}

function closeRestaurantModal() {
    restaurantModal.style.display = "none";
    restaurantForm.reset();
    restaurantMsg.innerText = "";
}

/* =========================
   LOAD RESTAURANTS
========================= */
async function loadRestaurants() {
    try {
        const response = await fetch("/api/business-dashboard/", {
            headers: authHeaders()
        });

        if (!response.ok) {
            throw new Error("Failed to load restaurants");
        }

        const restaurants = await response.json();
        renderRestaurants(restaurants);
        updateStats(restaurants);
    } catch (error) {
        restaurantList.innerHTML = `
            <div class="empty-state">
                <h4>Unable to load restaurants</h4>
                <p>Please try again later.</p>
            </div>
        `;
    }
}

/* =========================
   LOAD REVIEWS
========================= */
async function loadReviews() {
    try {
        const response = await fetch("/api/business-reviews/", {
            headers: authHeaders()
        });

        if (!response.ok) {
            throw new Error("Failed to load reviews");
        }

        const reviews = await response.json();
        renderReviews(reviews);
    } catch (error) {
        reviewList.innerHTML = `
            <div class="empty-state">
                <h4>Unable to load reviews</h4>
                <p>Please try again later.</p>
            </div>
        `;
    }
}

/* =========================
   RENDER RESTAURANTS
========================= */
function renderRestaurants(restaurants) {
    restaurantList.innerHTML = "";

    if (!restaurants.length) {
        restaurantList.innerHTML = `
            <div class="empty-state">
                <h4>No Restaurants Yet</h4>
                <p>Start by adding your first restaurant.</p>
            </div>
        `;
        return;
    }

    restaurants.forEach((r) => {
        const safeName = String(r.name).replace(/'/g, "\\'");
        restaurantList.innerHTML += `
            <div class="card">
                <img src="${r.image || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800'}" alt="${escapeHtml(r.name)}">
                <div class="card-body">
                    <h4>${escapeHtml(r.name)}</h4>
                    <p>${escapeHtml(r.description || "")}</p>
                    <p><strong>Address:</strong> ${escapeHtml(r.address)}</p>
                    <p><strong>Category:</strong> ${escapeHtml(r.category)}</p>
                    <p><strong>Price:</strong> ${escapeHtml(r.price_range)}</p>
                    <p><strong>Rating:</strong> ${parseFloat(r.average_rating || 0).toFixed(1)}</p>
                    <p><strong>Delivery:</strong> ${r.delivery_available ? "Yes" : "No"}</p>

                    <div class="card-actions">
                        <button type="button" onclick="openMenuModal(${r.id}, '${safeName}')">Manage Menu</button>
                    </div>
                </div>
            </div>
        `;
    });
}

/* =========================
   RENDER REVIEWS
========================= */
function renderReviews(reviews) {
    reviewList.innerHTML = "";

    if (!reviews.length) {
        reviewList.innerHTML = `
            <div class="empty-state">
                <h4>No Reviews Yet</h4>
                <p>Customer reviews will appear here once orders are reviewed.</p>
            </div>
        `;
        return;
    }

    reviews.forEach((review) => {
        reviewList.innerHTML += `
            <div class="review-card">
                <div class="review-card-top">
                    <div>
                        <h4>${escapeHtml(review.restaurant_name)}</h4>
                        <p class="review-meta"><strong>Customer:</strong> ${escapeHtml(review.customer_name)}</p>
                        <p class="review-meta"><strong>Order:</strong> #${review.order_id}</p>
                    </div>

                    <div class="review-rating-wrap">
                        <div class="review-stars">${renderStars(review.rating)}</div>
                        <div class="review-score">${review.rating}/5</div>
                    </div>
                </div>

                <p class="review-comment">${escapeHtml(review.comment || "No comment added.")}</p>
                <p class="review-date">Submitted: ${formatDateTime(review.created_at)}</p>
            </div>
        `;
    });
}

/* =========================
   UPDATE STATS
========================= */
function updateStats(restaurants) {
    document.getElementById("totalRestaurants").innerText = restaurants.length;

    const avg = restaurants.length
        ? (restaurants.reduce((sum, r) => sum + parseFloat(r.average_rating || 0), 0) / restaurants.length).toFixed(1)
        : "0.0";

    const deliveryCount = restaurants.filter((r) => r.delivery_available).length;

    document.getElementById("averageRating").innerText = avg;
    document.getElementById("deliveryEnabled").innerText = deliveryCount;
}

/* =========================
   ADD RESTAURANT
========================= */
restaurantForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    restaurantMsg.innerText = "";

    const formData = new FormData(restaurantForm);

    const payload = {
        name: formData.get("name"),
        description: formData.get("description"),
        address: formData.get("address"),
        latitude: parseFloat(formData.get("latitude")),
        longitude: parseFloat(formData.get("longitude")),
        category: formData.get("category"),
        price_range: formData.get("price_range"),
        delivery_available: formData.get("delivery_available") === "on",
        image: formData.get("image")
    };

    try {
        const response = await fetch("/api/add-restaurant/", {
            method: "POST",
            headers: authHeaders({
                "Content-Type": "application/json"
            }),
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.status === 201) {
            closeRestaurantModal();
            loadRestaurants();
        } else {
            const firstError = Object.values(data)[0];
            restaurantMsg.innerText = Array.isArray(firstError) ? firstError[0] : "Failed to add restaurant.";
        }
    } catch (error) {
        restaurantMsg.innerText = "Server communication error.";
    }
});

/* =========================
   MENU MODAL
========================= */
function openMenuModal(restaurantId, restaurantName) {
    currentRestaurantId = restaurantId;
    editingMenuItemId = null;

    document.getElementById("menuModalTitle").innerText = `Manage Menu - ${restaurantName}`;
    menuModal.style.display = "flex";
    menuForm.reset();
    menuMsg.innerText = "";

    loadMenuItems();
}

function closeMenuModal() {
    menuModal.style.display = "none";
    menuForm.reset();
    menuMsg.innerText = "";
    currentRestaurantId = null;
    editingMenuItemId = null;
}

/* =========================
   LOAD MENU ITEMS
========================= */
async function loadMenuItems() {
    if (!currentRestaurantId) return;

    menuItemsList.innerHTML = "";

    try {
        const response = await fetch(`/api/restaurants/${currentRestaurantId}/menu/`, {
            headers: authHeaders()
        });

        if (!response.ok) {
            throw new Error("Failed to load menu items");
        }

        const items = await response.json();

        if (!items.length) {
            menuItemsList.innerHTML = `
                <div class="empty-state">
                    <p>No menu items yet.</p>
                </div>
            `;
            return;
        }

        items.forEach((item) => {
            const escapedName = String(item.name).replace(/'/g, "\\'");
            const escapedDescription = String(item.description || "").replace(/'/g, "\\'");
            menuItemsList.innerHTML += `
                <div class="card">
                    <div class="card-body">
                        <h4>${escapeHtml(item.name)}</h4>
                        <p>${escapeHtml(item.description || "")}</p>
                        <p><strong>Price:</strong> ৳${item.price}</p>
                        <p><strong>Status:</strong> ${item.available ? "Available" : "Unavailable"}</p>
                        <div class="card-actions">
                            <button type="button" onclick="editMenuItem(${item.id}, '${escapedName}', '${escapedDescription}', '${item.price}', ${item.available})">Edit</button>
                            <button type="button" class="secondary-btn" onclick="removeMenuItem(${item.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        });
    } catch (error) {
        menuItemsList.innerHTML = `
            <div class="empty-state">
                <p>Failed to load menu items.</p>
            </div>
        `;
    }
}

/* =========================
   EDIT MENU ITEM
========================= */
function editMenuItem(id, name, description, price, available) {
    editingMenuItemId = id;
    document.getElementById("menu_name").value = name;
    document.getElementById("menu_description").value = description;
    document.getElementById("menu_price").value = price;
    document.getElementById("menu_available").checked = available;
}

/* =========================
   DELETE MENU ITEM
========================= */
async function removeMenuItem(itemId) {
    const confirmDelete = confirm("Are you sure you want to delete this menu item?");
    if (!confirmDelete) return;

    try {
        const response = await fetch(`/api/menu-items/${itemId}/delete/`, {
            method: "DELETE",
            headers: authHeaders()
        });

        if (response.ok) {
            loadMenuItems();
        } else {
            alert("Failed to delete menu item.");
        }
    } catch (error) {
        alert("Server communication error.");
    }
}

/* =========================
   SAVE / UPDATE MENU ITEM
========================= */
menuForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    menuMsg.innerText = "";

    const payload = {
        name: document.getElementById("menu_name").value,
        description: document.getElementById("menu_description").value,
        price: document.getElementById("menu_price").value,
        available: document.getElementById("menu_available").checked
    };

    try {
        let url = `/api/restaurants/${currentRestaurantId}/menu/add/`;
        let method = "POST";

        if (editingMenuItemId) {
            url = `/api/menu-items/${editingMenuItemId}/update/`;
            method = "PUT";
        }

        const response = await fetch(url, {
            method: method,
            headers: authHeaders({
                "Content-Type": "application/json"
            }),
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
            menuForm.reset();
            editingMenuItemId = null;
            loadMenuItems();
        } else {
            const firstError = Object.values(data)[0];
            menuMsg.innerText = Array.isArray(firstError) ? firstError[0] : "Failed to save menu item.";
        }
    } catch (error) {
        menuMsg.innerText = "Server communication error.";
    }
});

/* =========================
   LOGOUT
========================= */
async function logout() {
    try {
        await fetch("/api/logout/", {
            method: "POST",
            headers: authHeaders()
        });
    } catch (error) {}

    localStorage.removeItem("token");
    localStorage.removeItem("access");
    localStorage.removeItem("refresh");
    localStorage.removeItem("role");
    window.location.href = "/login/";
}

/* =========================
   INIT
========================= */
loadRestaurants();
loadReviews();
</script>

</body>
</html>
